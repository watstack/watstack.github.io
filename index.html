<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #FFF9F3; --warm-bg: #FDF5ED;
  --brown-mid: #6B4226; --brown-light: #8B6F5C;
  --tan: #A68B76; --tan-pale: #D4C4B0; --accent: #D4845A;
  --border: #F5EDE5;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Nunito', -apple-system, sans-serif;
}
body {
  font-family: var(--font-body); color: var(--brown-mid);
  background: linear-gradient(180deg, var(--cream) 0%, var(--warm-bg) 100%);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; -webkit-font-smoothing: antialiased;
}
.card {
  background: white; border-radius: 24px; padding: 40px 32px;
  max-width: 420px; width: 100%; text-align: center;
  box-shadow: 0 2px 24px rgba(139,94,60,0.08);
}
h1 { font-family: var(--font-display); font-size: 36px; font-weight: 400; margin-bottom: 8px; }
.sub { color: var(--tan); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
.btn {
  display: block; background: var(--accent); color: white;
  text-decoration: none; border-radius: 14px; padding: 15px 24px;
  font-size: 16px; font-weight: 700; font-family: var(--font-body);
  margin-bottom: 12px; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.9; }
.btn-secondary {
  display: block; background: var(--cream); color: var(--brown-light);
  text-decoration: none; border-radius: 14px; padding: 15px 24px;
  font-size: 16px; font-weight: 600; font-family: var(--font-body);
  border: 1.5px solid var(--border); transition: opacity 0.15s;
}
.btn-secondary:hover { opacity: 0.8; }
footer { margin-top: 32px; font-size: 12px; color: var(--tan-pale); }
</style>
</head>
<body>
  <div class="card">
    <h1>🍼 FeedSafe</h1>
    <p class="sub">Know when it's safe to breastfeed after drinking alcohol. Free, private, no account needed.</p>
    <a class="btn" href="https://watstack.github.io/Feedsafe.html">Open FeedSafe →</a>
